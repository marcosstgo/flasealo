<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cameraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Camera body -->
  <rect x="15" y="30" width="70" height="50" rx="8" fill="url(#cameraGradient)"/>

  <!-- Camera lens -->
  <circle cx="50" cy="55" r="18" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="55" r="12" fill="#1e3a8a"/>
  <circle cx="47" cy="52" r="4" fill="#60a5fa" opacity="0.6"/>

  <!-- Flash icon (lightning bolt) -->
  <path d="M 68 20 L 60 35 L 68 35 L 62 48 L 72 33 L 65 33 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>

  <!-- Viewfinder -->
  <rect x="68" y="36" width="10" height="7" rx="2" fill="#93c5fd"/>

  <!-- Shutter button -->
  <circle cx="72" cy="50" r="3" fill="#dbeafe"/>
</svg>